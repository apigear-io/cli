version: "3"

env:
  GO111MODULE: on
  CGO_ENABLED: 0

vars:
  GIT_COMMIT:
    sh: git rev-parse --short HEAD
  GIT_TAG:
    sh: git describe --tags --abbrev=0 --exact-match 2>/dev/null || echo "v99.0.0"
  BUILD_DATA:
    sh: date -u '+%Y-%m-%dT%H:%M:%SZ'

tasks:
  # =============================================================================
  # Backend (Go) Tasks
  # =============================================================================

  setup:
    desc: Setup backend dependencies
    cmds:
      - go mod tidy

  build:
    desc: Build backend binary
    cmds:
      - go build -o ./bin/apigear -ldflags="-X main.version={{.GIT_TAG}} -X main.commit={{.GIT_COMMIT}} -X main.date={{.BUILD_DATA}}" ./cmd/apigear
    sources:
      - "**/*.go"

  install:
    desc: Install backend binary to GOPATH
    cmds:
      - go install -ldflags="-X main.version={{.GIT_TAG}} -X main.commit={{.GIT_COMMIT}} -X main.date={{.BUILD_DATA}}" ./cmd/apigear

  lint:
    desc: Lint backend code
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run backend tests
    cmds:
      - go test ./...

  test:ci:
    desc: Run backend tests on CI
    cmds:
      - go test -failfast -race ./...

  test:nats:
    desc: Run backend tests with nats
    cmds:
      - go test -tags=nats ./...

  test:cover:
    desc: Run backend tests with coverage
    cmds:
      - go test -coverprofile=coverage.txt ./...

  cover:
    desc: Show backend coverage report
    cmds:
      - go tool cover -html=coverage.txt

  run:
    desc: Run backend CLI
    cmds:
      - go run ./cmd/apigear {{.CLI_ARGS}}
    sources:
      - "**/*.go"

  debug:
    desc: Debug backend CLI with delve
    cmds:
      - dlv debug ./cmd/apigear -- {{.CLI_ARGS}}

  vuln:
    desc: Check backend for vulnerabilities
    cmds:
      - govulncheck ./...

  # =============================================================================
  # Frontend (Web UI) Tasks
  # =============================================================================

  web:setup:
    desc: Setup frontend dependencies
    dir: web
    cmds:
      - pnpm install

  web:build:
    desc: Build frontend for production
    dir: web
    cmds:
      - pnpm build
    sources:
      - "src/**/*"
      - "*.config.*"
      - "package.json"

  web:dev:
    desc: Start frontend development server
    dir: web
    cmds:
      - pnpm dev

  web:preview:
    desc: Preview frontend production build
    dir: web
    cmds:
      - pnpm preview

  web:lint:
    desc: Lint frontend code
    dir: web
    cmds:
      - pnpm lint

  web:type-check:
    desc: Type check frontend TypeScript
    dir: web
    cmds:
      - pnpm type-check

  web:test:
    desc: Run frontend unit tests
    dir: web
    cmds:
      - pnpm exec vitest run

  web:test:watch:
    desc: Run frontend unit tests in watch mode
    dir: web
    cmds:
      - pnpm test

  web:test:ui:
    desc: Run frontend unit tests with UI
    dir: web
    cmds:
      - pnpm test:ui

  web:test:coverage:
    desc: Run frontend unit tests with coverage
    dir: web
    cmds:
      - pnpm test:coverage

  web:test:e2e:
    desc: Run frontend E2E tests
    dir: web
    cmds:
      - pnpm test:e2e

  web:test:e2e:ui:
    desc: Run frontend E2E tests with UI
    dir: web
    cmds:
      - pnpm test:e2e:ui

  web:test:all:
    desc: Run all frontend tests (unit + E2E)
    dir: web
    cmds:
      - pnpm exec vitest run
      - pnpm test:e2e

  web:clean:
    desc: Clean frontend build artifacts
    dir: web
    cmds:
      - rm -rf dist
      - rm -rf node_modules/.vite
      - rm -rf coverage
      - rm -rf test-results
      - rm -rf playwright-report

  # =============================================================================
  # Unified Tasks (Backend + Frontend)
  # =============================================================================

  setup:all:
    desc: Setup both backend and frontend dependencies
    cmds:
      - task: setup
      - task: web:setup

  build:all:
    desc: Build both backend and frontend
    cmds:
      - task: build
      - task: web:build

  lint:all:
    desc: Lint both backend and frontend
    cmds:
      - task: lint
      - task: web:lint

  test:all:
    desc: Run all tests (backend + frontend)
    cmds:
      - task: test
      - task: web:test:all

  clean:all:
    desc: Clean both backend and frontend artifacts
    cmds:
      - task: clean
      - task: web:clean

  ci:all:
    desc: Run all CI checks (backend + frontend)
    cmds:
      - task: setup:all
      - task: lint:all
      - task: test:ci
      - task: web:type-check
      - task: web:test
      - task: build:all

  dev:
    desc: Start full development environment with live reloading (requires overmind + air)
    cmds:
      - overmind start

  dev:simple:
    desc: Start full development environment without live reloading (requires overmind)
    cmds:
      - overmind start -f Procfile.dev

  dev:manual:
    desc: Show instructions for manual development setup
    cmds:
      - echo "=== Manual Development Setup ==="
      - echo ""
      - echo "Terminal 1 (Backend with live reload)"
      - echo "  air -c .air.toml"
      - echo ""
      - echo "Terminal 2 (Frontend with HMR)"
      - echo "  cd web && pnpm dev"
      - echo ""
      - echo "Or without air"
      - echo "  Terminal 1 - task run -- serve --port 8080"
      - echo "  Terminal 2 - cd web && pnpm dev"
      - echo ""
      - echo "=== URLs ==="
      - echo "  Backend  - http://localhost:8080"
      - echo "  Frontend - http://localhost:5173 (dev mode)"
      - echo "  Web UI   - http://localhost:8080 (served by backend)"

  # =============================================================================
  # Utility Tasks
  # =============================================================================

  ci:
    desc: Run backend CI checks (backward compatibility)
    cmds:
      - task: setup
      - task: lint
      - task: test:ci

  default:
    desc: Run all CI checks (backend + frontend)
    cmds:
      - task: ci:all

  clean:
    desc: Clean backend artifacts
    cmds:
      - rm -rf ./bin
      - rm -rf ./coverage.txt

  antlr:
    desc: Generate antlr parser
    cmds:
      - antlr -Dlanguage=Go pkg/idl/parser/ObjectApi.g4

  docs:
    desc: Generate documentation
    cmds:
      - rm -rf ./docs
      - mkdir -p ./docs
      - go run ./cmd/apigear x doc

  schema:
    desc: Convert yaml schemas to json
    cmds:
      - go run ./cmd/apigear x y2j 'pkg/spec/schema/*.yaml'
