basePath: /api/v1
definitions:
  handler.HealthResponse:
    properties:
      status:
        type: string
      timestamp:
        type: string
    type: object
  handler.StatusResponse:
    properties:
      buildDate:
        type: string
      commit:
        type: string
      goVersion:
        type: string
      uptime:
        type: string
      version:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API for ApiGear CLI operations
  title: ApiGear CLI API
  version: "1.0"
paths:
